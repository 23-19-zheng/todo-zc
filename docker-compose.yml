version: '3.8'

services:
  # ========================================
  # MySQL 数据库
  # ========================================
  mysql:
    image: mysql:8.0
    container_name: todo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-TodoRoot@2024}
      MYSQL_DATABASE: todo_db
      MYSQL_USER: ${DB_USERNAME:-todo_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-TodoUser@2024}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-TodoRoot@2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo-network

  # ========================================
  # Redis 缓存
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: todo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-TodoRedis@2024} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-TodoRedis@2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo-network

  # ========================================
  # Todo 应用
  # ========================================
  todo-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: todo-app:latest
    container_name: todo-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Spring配置
      SPRING_PROFILES_ACTIVE: prd

      # 数据库配置
      DB_HOST: mysql
      DB_NAME: todo_db
      DB_USERNAME: ${DB_USERNAME:-todo_user}
      DB_PASSWORD: ${DB_PASSWORD:-TodoUser@2024}

      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-TodoRedis@2024}

      # JWT配置（请修改为安全的密钥）
      JWT_SECRET: ${JWT_SECRET:-todo-app-production-jwt-secret-key-must-be-at-least-256-bits-long-for-security-2024}

      # JVM配置
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - todo-network

# ========================================
# 数据卷
# ========================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ========================================
# 网络
# ========================================
networks:
  todo-network:
    driver: bridge